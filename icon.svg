<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00ccff"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#040d1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="url(#bgGrad)" stroke="#00ff8833" stroke-width="1"/>

  <!-- Outer ring ticks -->
  <g stroke="#00ff8844" stroke-width="1.5">
    <line x1="64" y1="4" x2="64" y2="14"/>
    <line x1="64" y1="114" x2="64" y2="124"/>
    <line x1="4" y1="64" x2="14" y2="64"/>
    <line x1="114" y1="64" x2="124" y2="64"/>
    <line x1="22" y1="22" x2="29" y2="29"/>
    <line x1="99" y1="99" x2="106" y2="106"/>
    <line x1="106" y1="22" x2="99" y2="29"/>
    <line x1="29" y1="99" x2="22" y2="106"/>
  </g>

  <!-- Shield body -->
  <path d="M64 18 L96 30 L96 62 C96 80 82 94 64 102 C46 94 32 80 32 62 L32 30 Z"
    fill="#040d1a" stroke="url(#shieldGrad)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Shield inner highlight -->
  <path d="M64 24 L90 34 L90 62 C90 77 78 89 64 96 C50 89 38 77 38 62 L38 34 Z"
    fill="none" stroke="#00ff8822" stroke-width="1"/>

  <!-- Lock body -->
  <rect x="50" y="58" width="28" height="22" rx="4" ry="4"
    fill="none" stroke="url(#shieldGrad)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Lock shackle -->
  <path d="M55 58 L55 50 C55 44 73 44 73 50 L73 58"
    fill="none" stroke="url(#shieldGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Lock keyhole -->
  <circle cx="64" cy="68" r="3.5" fill="url(#shieldGrad)" filter="url(#glow)"/>
  <rect x="62.5" y="68" width="3" height="5" rx="1" fill="url(#shieldGrad)"/>

  <!-- Corner circuit lines -->
  <g stroke="#00ff8833" stroke-width="1" fill="none">
    <polyline points="18,18 18,10 26,10"/>
    <polyline points="110,18 110,10 102,10"/>
    <polyline points="18,110 18,118 26,118"/>
    <polyline points="110,110 110,118 102,118"/>
  </g>

  <!-- Scanning arc -->
  <path d="M 30 64 A 34 34 0 0 1 98 64" fill="none" stroke="#00ccff22" stroke-width="1" stroke-dasharray="3,4"/>
</svg>
